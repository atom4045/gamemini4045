<!DOCTYPE html>
<html>
<head>
<title>Phone Smash</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#222;
border:3px solid white;
margin-top:20px;
}

button{
padding:12px 20px;
font-size:16px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>📱 Phone Smash</h1>

<p>Очки: <span id="points">0</span></p>
<p>Оружие: <span id="weapon">Палка</span></p>

<button onclick="upgrade()">Улучшить оружие</button>

<br>

<canvas id="game" width="500" height="300"></canvas>

<script>

let canvas = document.getElementById("game")
let ctx = canvas.getContext("2d")

let points = 0

let weaponLevel = 0

let weapons = [
"Палка",
"Молоток",
"Кувалда"
]

let damage = [
1,
3,
7
]

let swing = 0

function draw(){

ctx.clearRect(0,0,500,300)

ctx.fillStyle="gray"
ctx.fillRect(220,120,60,100)

ctx.fillStyle="white"
ctx.fillText("Телефон",225,110)

ctx.save()

ctx.translate(150,200)
ctx.rotate(swing)

ctx.fillStyle="brown"

if(weaponLevel == 0){
ctx.fillRect(0,-5,80,10)
}

if(weaponLevel == 1){
ctx.fillRect(0,-5,60,10)
ctx.fillRect(50,-15,20,30)
}

if(weaponLevel == 2){
ctx.fillRect(0,-5,50,10)
ctx.fillRect(40,-25,40,50)
}

ctx.restore()

}

function hit(){

swing = -0.8

points += damage[weaponLevel]

document.getElementById("points").innerText = points

}

function upgrade(){

if(points >= 20 && weaponLevel < 2){

points -= 20

weaponLevel++

document.getElementById("weapon").innerText = weapons[weaponLevel]

}

}

canvas.onclick = hit

function update(){

if(swing < 0){
swing += 0.1
}

draw()

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>

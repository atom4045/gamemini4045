<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phone Destroyer</title>

<style>

body{
margin:0;
background:linear-gradient(180deg,#0f0f0f,#1a1a1a);
color:white;
font-family:Arial;
overflow:hidden;
}

#ui{
position:absolute;
left:120px;
top:20px;
width:260px;
background:#1e1e1e;
padding:15px;
border-radius:12px;
box-shadow:0 0 20px #000;
}

button{
width:100%;
margin-top:6px;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
background:#333;
color:white;
}

button:hover{
background:#444;
}

canvas{
position:absolute;
right:0;
top:0;
}

#shop{
display:none;
}

</style>
</head>

<body>

<div id="ui">

<h3>Очки: <span id="points">0</span></h3>
Оружие: <span id="weapon">Палка</span>

<button onclick="upgradeWeapon()">
Улучшить оружие (<span id="weaponCost"></span>)
</button>

<br><br>

<button onclick="toggleShop()">🛒 Магазин</button>

<div id="shop">

<h4>Бонус очков</h4>

<button onclick="buyUpgrade(1,50)">+1 за точку (50)</button>
<button onclick="buyUpgrade(2,120)">+2 за точку (120)</button>
<button onclick="buyUpgrade(5,400)">+5 за точку (400)</button>

<h4>Автокликер</h4>

<button onclick="buyAuto(1,80)">1 клик/с (80)</button>
<button onclick="buyAuto(5,350)">5 кликов/с (350)</button>
<button onclick="buyAuto(10,900)">10 кликов/с (900)</button>

</div>

</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("gameCanvas")
const ctx = canvas.getContext("2d")

let points = 0
let bonus = 1
let auto = 0

let weaponLevel = 0

let weapons = [

{n:"Палка",d:1,c:50},
{n:"Камень",d:2,c:150},
{n:"Молоток",d:3,c:300},
{n:"Бита",d:4,c:700},
{n:"Кувалда",d:6,c:1500},
{n:"Дрель",d:8,c:3000},
{n:"Пила",d:10,c:6000},
{n:"Дробовик",d:15,c:12000},
{n:"Ракетница",d:25,c:20000},
{n:"Лазер",d:40,c:35000}

]

let hits = 0
let maxHits = 10

let weak = spawnPoint()

let particles=[]
let cracks=[]

function spawnPoint(){

return{
x:450 + Math.random()*200,
y:150 + Math.random()*200,
r:22
}

}

function drawPhone(){

ctx.fillStyle="#555"
ctx.fillRect(450,120,200,320)

ctx.fillStyle="#00aaff"
ctx.fillRect(465,140,170,260)

cracks.forEach(c=>{

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(c.x,c.y)
ctx.lineTo(c.x2,c.y2)
ctx.stroke()

})

}

function drawWeak(){

ctx.beginPath()
ctx.arc(weak.x,weak.y,weak.r,0,Math.PI*2)

ctx.fillStyle="red"
ctx.fill()

}

function spawnGlass(x,y){

for(let i=0;i<8;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:40

})

}

}

function drawParticles(){

particles.forEach(p=>{

ctx.fillStyle="#aeefff"
ctx.fillRect(p.x,p.y,3,3)

p.x+=p.vx
p.y+=p.vy
p.life--

})

particles=particles.filter(p=>p.life>0)

}

canvas.onclick=e=>{

const rect=canvas.getBoundingClientRect()

const mx=e.clientX-rect.left
const my=e.clientY-rect.top

const dx=mx-weak.x
const dy=my-weak.y

if(Math.sqrt(dx*dx+dy*dy)<weak.r){

hit(mx,my)

}

}

function hit(x,y){

points+=weapons[weaponLevel].d*bonus

hits++

spawnGlass(x,y)

cracks.push({
x:x,
y:y,
x2:x+(Math.random()*40-20),
y2:y+(Math.random()*40-20)
})

weak=spawnPoint()

if(hits>=maxHits){

setTimeout(resetPhone,300)

}

}

function resetPhone(){

hits=0
cracks=[]
weak=spawnPoint()

}

function upgradeWeapon(){

let next=weapons[weaponLevel+1]

if(next && points>=next.c){

points-=next.c
weaponLevel++

}

}

function buyUpgrade(v,c){

if(points>=c){

points-=c
bonus+=v

}

}

function buyAuto(v,c){

if(points>=c){

points-=c
auto+=v

}

}

function toggleShop(){

let shop=document.getElementById("shop")

shop.style.display=
shop.style.display=="none"?"block":"none"

}

setInterval(()=>{

for(let i=0;i<auto;i++) hit(550,250)

},1000)

function drawUI(){

document.getElementById("points").innerText=Math.floor(points)

document.getElementById("weapon").innerText=
weapons[weaponLevel].n

let next=weapons[weaponLevel+1]

document.getElementById("weaponCost").innerText=
next?next.c:"MAX"

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawPhone()
drawWeak()
drawParticles()
drawUI()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

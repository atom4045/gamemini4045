<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phone Breaker</title>

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
overflow:hidden;
}

#ui{
position:absolute;
left:90px;
top:20px;
width:260px;
background:#1c1c1c;
padding:15px;
border-radius:12px;
box-shadow:0 0 25px black;
}

#decor{
font-size:24px;
margin-bottom:10px;
}

button{
width:100%;
margin-top:6px;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
background:#333;
color:white;
}

button:hover{
background:#444;
}

canvas{
position:absolute;
right:0;
top:0;
}

#shop{
display:none;
}

</style>
</head>

<body>

<div id="ui">

<div id="decor">🔨 🪓 🔧 💣</div>

<h3>Очки: <span id="points">0</span></h3>
Оружие: <span id="weapon">Палка</span>

<button onclick="upgradeWeapon()">
Улучшить оружие (<span id="weaponCost"></span>)
</button>

<button onclick="toggleShop()">🛒 Магазин</button>

<div id="shop">

<h4>Бонус</h4>

<button onclick="buyUpgrade(1,20)">+1 за точку (20)</button>
<button onclick="buyUpgrade(2,60)">+2 за точку (60)</button>
<button onclick="buyUpgrade(5,150)">+5 за точку (150)</button>

<h4>Автокликер</h4>

<button onclick="buyAuto(1,30)">1 клик/с (30)</button>
<button onclick="buyAuto(5,120)">5 кликов/с (120)</button>

</div>

</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("gameCanvas")
const ctx = canvas.getContext("2d")

let points = 0
let bonus = 1
let auto = 0

let weaponLevel = 0
let swing = 0

let weapons = [

{n:"Палка",d:1,c:30},
{n:"Камень",d:2,c:80},
{n:"Молоток",d:3,c:150},
{n:"Бита",d:4,c:300},
{n:"Кувалда",d:6,c:600},
{n:"Дрель",d:8,c:1200}

]

let hits = 0
let maxHits = 10

let weak = spawnPoint()

let particles=[]
let cracks=[]

let phoneY=0
let trashAnim=false

function spawnPoint(){

return{
x:450 + Math.random()*200,
y:150 + Math.random()*200,
r:22
}

}

function drawPhone(){

ctx.save()

ctx.translate(0,phoneY)

ctx.fillStyle="#555"
ctx.fillRect(450,120,200,320)

ctx.fillStyle="#00aaff"
ctx.fillRect(465,140,170,260)

cracks.forEach(c=>{

ctx.strokeStyle="white"
ctx.lineWidth=2

ctx.beginPath()
ctx.moveTo(c.x,c.y)
ctx.lineTo(c.x2,c.y2)
ctx.stroke()

})

if(hits>7){

drawMatrix()

}

ctx.restore()

}

function drawMatrix(){

ctx.fillStyle="lime"

for(let i=0;i<40;i++){

ctx.fillRect(
470+Math.random()*150,
150+Math.random()*250,
2,
8
)

}

}

function drawWeak(){

ctx.beginPath()
ctx.arc(weak.x,weak.y,weak.r,0,Math.PI*2)

ctx.fillStyle="red"
ctx.fill()

}

function drawWeapon(){

ctx.save()

ctx.translate(380,300)

ctx.rotate(swing)

ctx.fillStyle="brown"

ctx.fillRect(0,-5,80,10)

ctx.restore()

}

function spawnGlass(x,y){

for(let i=0;i<10;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:40

})

}

}

function drawParticles(){

particles.forEach(p=>{

ctx.fillStyle="#aeefff"
ctx.fillRect(p.x,p.y,3,3)

p.x+=p.vx
p.y+=p.vy
p.life--

})

particles=particles.filter(p=>p.life>0)

}

canvas.onclick=e=>{

const rect=canvas.getBoundingClientRect()

const mx=e.clientX-rect.left
const my=e.clientY-rect.top

const dx=mx-weak.x
const dy=my-weak.y

if(Math.sqrt(dx*dx+dy*dy)<weak.r){

hit(mx,my)

}

}

function hit(x,y){

points+=weapons[weaponLevel].d*bonus

hits++

swing=-0.7

spawnGlass(x,y)

cracks.push({
x:x,
y:y,
x2:x+(Math.random()*80-40),
y2:y+(Math.random()*80-40)
})

weak=spawnPoint()

if(hits>=maxHits){

trashAnim=true

}

}

function drawTrash(){

ctx.fillStyle="#333"
ctx.fillRect(760,380,60,80)

ctx.fillStyle="white"
ctx.fillText("🗑",770,430)

}

function resetPhone(){

hits=0
cracks=[]
phoneY=0
trashAnim=false
weak=spawnPoint()

}

function upgradeWeapon(){

let next=weapons[weaponLevel+1]

if(next && points>=next.c){

points-=next.c
weaponLevel++

}

}

function buyUpgrade(v,c){

if(points>=c){

points-=c
bonus+=v

}

}

function buyAuto(v,c){

if(points>=c){

points-=c
auto+=v

}

}

function toggleShop(){

let shop=document.getElementById("shop")

shop.style.display=
shop.style.display=="none"?"block":"none"

}

setInterval(()=>{

for(let i=0;i<auto;i++) hit(550,250)

},1000)

function drawUI(){

document.getElementById("points").innerText=Math.floor(points)

document.getElementById("weapon").innerText=
weapons[weaponLevel].n

let next=weapons[weaponLevel+1]

document.getElementById("weaponCost").innerText=
next?next.c:"MAX"

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawTrash()

drawPhone()

drawWeak()

drawWeapon()

drawParticles()

if(swing<0) swing+=0.1

if(trashAnim){

phoneY+=6

if(phoneY>300){

resetPhone()

}

}

drawUI()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

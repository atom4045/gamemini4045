<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fixed Mobile Game</title>

<style>
body{
margin:0;
overflow:hidden;
touch-action:none;
background:#111;
}

canvas{
display:block;
}

#hpBar{
position:absolute;
top:10px;
left:10px;
width:220px;
height:18px;
background:#444;
}

#hp{
height:100%;
width:100%;
background:lime;
}

#joystick{
position:absolute;
left:30px;
bottom:30px;
width:170px;
height:170px;
background:rgba(255,255,255,0.15);
border-radius:50%;
}

#stick{
position:absolute;
left:95px;
bottom:95px;
width:70px;
height:70px;
background:rgba(255,255,255,0.5);
border-radius:50%;
}

#shoot{
position:absolute;
right:30px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
background:red;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

#super{
position:absolute;
right:40px;
bottom:150px;
width:75px;
height:75px;
border-radius:50%;
background:blue;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="hpBar"><div id="hp"></div></div>
<div id="joystick"></div>
<div id="stick"></div>
<div id="shoot">🔥</div>
<div id="super">⭐</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let mapSize={w:3500,h:2500}

let player={
x:1750,
y:1250,
hp:200,
superCharge:0
}

let move={x:0,y:0}
let bullets=[]
let enemies=[]

let audioCtx=new (window.AudioContext||window.webkitAudioContext)()

function playBeep(freq){

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.start()

gain.gain.setValueAtTime(0.1,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2)

osc.stop(audioCtx.currentTime+0.2)

}

function spawnEnemy(){

let isBoss=Math.random()<0.15

enemies.push({
x:Math.random()*(mapSize.w-200)+100,
y:Math.random()*(mapSize.h-200)+100,
hp:isBoss?200:60,
boss:isBoss,
cool:0
})

}

setInterval(spawnEnemy,1500)

let joystick=document.getElementById("joystick")
let stick=document.getElementById("stick")

joystick.addEventListener("touchstart",e=>moveStick(e))
joystick.addEventListener("touchmove",e=>moveStick(e))
joystick.addEventListener("touchend",()=>{move.x=0;move.y=0;stick.style.transform="translate(0px,0px)"})

function moveStick(e){

let t=e.touches[0]
let rect=joystick.getBoundingClientRect()

let x=t.clientX-(rect.left+85)
let y=t.clientY-(rect.top+85)

let length=Math.sqrt(x*x+y*y)
if(length>60){
x=x/length*60
y=y/length*60
}

stick.style.transform=`translate(${x}px,${y}px)`

move.x=x/30
move.y=y/30

}

document.getElementById("shoot").addEventListener("touchstart",()=>{

bullets.push({
x:player.x,
y:player.y,
vx:10,
vy:0,
damage:20
})

player.superCharge++

playBeep(300)

})

document.getElementById("super").addEventListener("touchstart",()=>{

if(player.superCharge>=3){

for(let i=0;i<25;i++){
bullets.push({
x:player.x,
y:player.y,
vx:Math.cos(i)*9,
vy:Math.sin(i)*9,
damage:35
})
}

player.superCharge=0
playBeep(600)

}

})

function update(){

player.x+=move.x
player.y+=move.y

player.x=Math.max(0,Math.min(mapSize.w,player.x))
player.y=Math.max(0,Math.min(mapSize.h,player.y))

bullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

}

function enemyAI(e){

let dx=player.x-e.x
let dy=player.y-e.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(e.boss){

e.x+=dx/dist*0.4
e.y+=dy/dist*0.4

}else{

if(dist<600){
e.x+=dx/dist*0.7
e.y+=dy/dist*0.7
}

}

}

function collision(){

bullets.forEach(b=>{
enemies.forEach(e=>{
let dx=b.x-e.x
let dy=b.y-e.y
if(Math.sqrt(dx*dx+dy*dy)<15){
e.hp-=b.damage
b.x=-999
}
})
})

enemies=enemies.filter(e=>e.hp>0)

}

function camera(){

ctx.setTransform(1,0,0,1,0,0)

let camX=player.x-canvas.width/2
let camY=player.y-canvas.height/2

ctx.translate(-camX,-camY)

}

function draw(){

ctx.clearRect(0,0,mapSize.w,mapSize.h)

camera()

ctx.fillStyle="#2f8f4e"
ctx.fillRect(0,0,mapSize.w,mapSize.h)

ctx.fillStyle="blue"
ctx.beginPath()
ctx.arc(player.x,player.y,18,0,Math.PI*2)
ctx.fill()

enemies.forEach(e=>{
ctx.fillStyle=e.boss?"purple":"red"
ctx.beginPath()
ctx.arc(e.x,e.y,e.boss?25:15,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,6,3)
})

}

function hpUpdate(){

document.getElementById("hp").style.width=(player.hp/200*100)+"%"

if(player.hp<=0){
location.reload()
}

}

function loop(){

enemies.forEach(e=>{
e.cool--
enemyAI(e)
})

update()
collision()
draw()
hpUpdate()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

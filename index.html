<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hatamal: Mama Kirilla Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2a1b3d; font-family: 'Arial', sans-serif; touch-action: manipulation; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 15px; left: 15px; color: #fff;
            background: rgba(255, 0, 255, 0.3); padding: 10px; border: 2px solid #fff;
            border-radius: 12px; pointer-events: none; backdrop-filter: blur(5px);
        }
        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.2);
            border: 3px solid #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: #fff;
            font-size: 35px; font-weight: bold; user-select: none;
        }
        .btn:active { background: rgba(255, 255, 255, 0.6); }
        #screamer {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; z-index: 9999; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="stage" style="font-weight: bold;">EVO: 1 - МИКРО-ДРОН</div>
    <div id="xp">МАССА: 0 / 20</div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <div style="display: flex; gap: 20px;">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="btn" id="btnFly" style="background: #ff4dff; border-color: #fff;">FLY</div>
</div>

<div id="screamer">
    <div style="color: red; font-size: 500px; transform: scale(2);">🐷</div>
    <h1 style="color: white; position: absolute; bottom: 50px;">МАМА КИРИЛЛА НАШЛА ТЕБЯ!</h1>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const sc = document.getElementById('screamer');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const world = { width: 4000, height: 2000 };
const gravity = 0.18;
const friction = 0.96;

let obstacles = [];
for(let i=0; i<25; i++) {
    obstacles.push({
        x: 500 + i * 400 + Math.random()*200,
        y: world.height - (300 + Math.random()*500),
        w: 100 + Math.random()*150,
        h: 1000,
        color: `hsl(${280 + Math.random()*40}, 50%, 40%)`
    });
}

const evolutions = [
    { name: "МИКРО-ДРОН", xp: 20, s: 15, spd: 0.4, fly: 4.5, draw: (x,y,r,t) => {
        ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#fff'; ctx.strokeRect(x-r, y-2, r*2, 4);
    }},
    { name: "НЕО-ЖУК", xp: 50, s: 25, spd: 0.5, fly: 4.8, draw: (x,y,r,t) => {
        ctx.fillStyle = '#f0f'; ctx.beginPath(); ctx.ellipse(x,y,r*1.2, r, Math.sin(t*0.1)*0.2, 0, Math.PI*2); ctx.fill();
    }},
    { name: "ПЛАЗМЕННЫЙ СКАТ", xp: 100, s: 35, spd: 0.6, fly: 5.2, draw: (x,y,r,t) => {
        ctx.fillStyle = '#44f'; ctx.beginPath(); ctx.moveTo(x-r*1.5, y); ctx.quadraticCurveTo(x, y-r, x+r*1.5, y); ctx.fill();
    }},
    { name: "КИБЕР-ГЛАЗ", xp: 200, s: 45, spd: 0.7, fly: 5.5, draw: (x,y,r,t) => {
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x+Math.cos(t*0.1)*10, y, 15, 0, Math.PI*2); ctx.fill();
    }},
    { name: "ЗОЛОТОЙ ФЕНИКС", xp: 350, s: 55, spd: 0.8, fly: 6.0, draw: (x,y,r,t) => {
        ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.moveTo(x-r, y); ctx.lineTo(x, y-r*1.2); ctx.lineTo(x+r, y); ctx.fill();
    }},
    { name: "МЕХА-ТИГР", xp: 500, s: 65, spd: 0.9, fly: 6.5, draw: (x,y,r,t) => {
        ctx.fillStyle = '#f60'; ctx.fillRect(x-r, y-r/2, r*2, r); ctx.fillStyle='#000'; ctx.fillRect(x+r-10, y-r/2, 10, 10);
    }},
    { name: "ДЕМОН БЕЗДНЫ", xp: 700, s: 80, spd: 1.0, fly: 7.0, draw: (x,y,r,t) => {
        ctx.fillStyle = '#202'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='red'; ctx.stroke();
    }},
    { name: "ТИТАН-ГРОД", xp: 1000, s: 100, spd: 1.1, fly: 7.5, draw: (x,y,r,t) => {
        ctx.fillStyle = '#fff'; ctx.shadowBlur=20; ctx.shadowColor='#0ff'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }},
    { name: "МАМА КИРИЛЛА", xp: 5000, s: 150, spd: 1.3, fly: 8.5, draw: (x,y,r,t) => {
        // Огромная свинья
        ctx.fillStyle = '#ff99cc';
        ctx.beginPath(); ctx.ellipse(x, y, r*1.2, r, 0, 0, Math.PI*2); ctx.fill(); // Тело
        ctx.fillStyle = '#ff66aa'; ctx.beginPath(); ctx.arc(x+r*0.8, y, r*0.4, 0, Math.PI*2); ctx.fill(); // Голова
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x+r*1.1, y-10, 8, 0, Math.PI*2); ctx.fill(); // Глаз
        ctx.fillStyle = '#ff3388'; ctx.beginPath(); ctx.ellipse(x+r*1.2, y+10, 20, 15, 0, 0, Math.PI*2); ctx.fill(); // Пятачок
    }}
];

const player = { x: 200, y: 500, vx: 0, vy: 0, level: 0, xp: 0, face: 1 };
let food = [];
const spawn = (type) => food.push({ x: Math.random()*world.width, y: Math.random()*(world.height-100), type, t: Math.random()*10 });

for(let i=0; i<100; i++) spawn(i%10===0 ? 'big' : 'small');
setInterval(() => spawn('rare'), 5000);

const keys = {};
document.getElementById('btnFly').ontouchstart = (e) => { e.preventDefault(); player.vy = -evolutions[player.level].fly; };
document.getElementById('btnLeft').ontouchstart = (e) => { e.preventDefault(); keys.Left = true; };
document.getElementById('btnLeft').ontouchend = () => keys.Left = false;
document.getElementById('btnRight').ontouchstart = (e) => { e.preventDefault(); keys.Right = true; };
document.getElementById('btnRight').ontouchend = () => keys.Right = false;

window.onkeydown = (e) => { if(e.code==='ArrowUp' || e.code==='Space') player.vy = -evolutions[player.level].fly; keys[e.code]=true; };
window.onkeyup = (e) => keys[e.code]=false;

let tick = 0;
function loop() {
    tick++;
    const evo = evolutions[player.level];
    
    if (keys.ArrowLeft || keys.Left) { player.vx -= evo.spd; player.face = -1; }
    if (keys.ArrowRight || keys.Right) { player.vx += evo.spd; player.face = 1; }

    player.vx *= friction; player.vy += gravity;
    player.x += player.vx; player.y += player.vy;

    // Столкновения (Мама Кирилла ест всё!)
    obstacles = obstacles.filter(o => {
        let hit = player.x+evo.s > o.x && player.x-evo.s < o.x+o.w && player.y+evo.s > o.y;
        if(hit) {
            if(player.level === 8) return false; // Съели здание
            if(player.y < o.y + 30) { player.y = o.y-evo.s; player.vy = 0; }
            else { player.vx *= -1.2; player.x += player.vx; }
        }
        return true;
    });

    if(player.y > world.height-evo.s) { player.y = world.height-evo.s; player.vy = 0; }
    if(player.x < evo.s) player.x = evo.s;
    if(player.x > world.width-evo.s) player.x = world.width-evo.s;

    food = food.filter(f => {
        if(Math.hypot(player.x-f.x, player.y-f.y) < evo.s + 20) {
            player.xp += (f.type==='small'?2 : f.type==='big'?5 : 50);
            if(f.type !== 'rare') spawn(f.type);
            return false;
        }
        return true;
    });

    if(player.xp >= evo.xp && player.level < 8) { player.level++; player.xp = 0; }
    
    // ПРОВЕРКА СКРИМЕРА
    if(player.level === 8 && player.xp >= 1000) {
        sc.style.display = 'flex';
        return; 
    }

    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.fillStyle = '#4a306d'; ctx.fillRect(0,0,canvas.width,canvas.height);
    const cx = Math.max(0, Math.min(player.x - canvas.width/2, world.width - canvas.width));
    const cy = Math.max(0, Math.min(player.y - canvas.height/2, world.height - canvas.height));
    ctx.save(); ctx.translate(-cx, -cy);

    // Дальние детали (горы/облака)
    ctx.fillStyle = '#3d2b56';
    for(let i=0; i<10; i++) ctx.fillRect(i*500, world.height-400, 300, 400);

    // Здания
    obstacles.forEach(o => {
        ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = '#fff'; ctx.lineWidth=1; ctx.strokeRect(o.x, o.y, o.w, o.h);
        // Окна
        ctx.fillStyle = '#ffffaa';
        for(let i=0; i<2; i++) ctx.fillRect(o.x+20+i*40, o.y+50, 20, 30);
    });

    // Еда
    food.forEach(f => {
        ctx.save();
        let pulse = Math.sin(tick*0.1 + f.t)*5;
        if(f.type==='rare') {
            ctx.fillStyle=`hsl(${tick*5%360},100%,50%)`;
            ctx.shadowBlur=15; ctx.shadowColor='white';
        } else ctx.fillStyle = f.type==='small' ? '#0ff' : '#ff0';
        ctx.beginPath(); ctx.arc(f.x, f.y, 8+pulse, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });

    // Игрок
    ctx.save();
    if(player.face === -1) { ctx.translate(player.x*2, 0); ctx.scale(-1, 1); }
    evolutions[player.level].draw(player.x, player.y, evolutions[player.level].s, tick);
    ctx.restore();

    ctx.restore();
    document.getElementById('stage').innerText = `EVO: ${player.level+1} - ${evolutions[player.level].name}`;
    document.getElementById('xp').innerText = `МАССА: ${player.xp} / ${player.level===8 ? '1000' : evolutions[player.level].xp}`;
}
loop();
</script>
</body>
</html>

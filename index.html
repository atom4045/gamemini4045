<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mobile Arena</title>

<style>
body{
margin:0;
overflow:hidden;
touch-action:none;
background:#1b1b1b;
}

canvas{
display:block;
background:#2f8f4e;
}

#hpBar{
position:absolute;
top:15px;
left:15px;
width:250px;
height:22px;
background:#444;
}

#hp{
height:100%;
width:100%;
background:lime;
}

#joystick{
position:absolute;
left:40px;
bottom:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.15);
border-radius:50%;
}

#stick{
position:absolute;
left:75px;
bottom:75px;
width:50px;
height:50px;
background:rgba(255,255,255,0.5);
border-radius:50%;
}

#shoot,#super{
position:absolute;
right:40px;
width:85px;
height:85px;
border-radius:50%;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

#shoot{
bottom:50px;
background:red;
}

#super{
bottom:150px;
background:blue;
}
</style>
</head>

<body>

<canvas id="game" width="1200" height="700"></canvas>

<div id="hpBar"><div id="hp"></div></div>
<div id="joystick"></div>
<div id="stick"></div>
<div id="shoot">🔥</div>
<div id="super">⭐</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={
x:600,
y:350,
hp:200,
level:1
}

let move={x:0,y:0}
let bullets=[]
let enemies=[]
let enemyBullets=[]
let superReady=true

// большой мир
let mapSize={w:3000,h:2000}

let joystick=document.getElementById("joystick")
let stick=document.getElementById("stick")

joystick.addEventListener("touchmove",e=>{
let t=e.touches[0]
let rect=joystick.getBoundingClientRect()

let x=t.clientX-(rect.left+60)
let y=t.clientY-(rect.top+60)

move.x=x/40
move.y=y/40

})

joystick.addEventListener("touchend",()=>{
move.x=0
move.y=0
})

document.getElementById("shoot").addEventListener("touchstart",shoot)

document.getElementById("super").addEventListener("touchstart",superAttack)

function shoot(){

bullets.push({
x:player.x,
y:player.y,
vx:10,
vy:0,
damage:15+player.level*2
})

}

function superAttack(){

if(!superReady) return

for(let i=0;i<20;i++){
bullets.push({
x:player.x,
y:player.y,
vx:Math.cos(i)*8,
vy:Math.sin(i)*8,
damage:25
})
}

superReady=false
setTimeout(()=>superReady=true,6000)

}

function spawnEnemy(){

let types=["red","green","purple"]
let type=types[Math.floor(Math.random()*3)]

enemies.push({
x:Math.random()*2800+100,
y:Math.random()*1800+100,
type:type,
hp:50,
cool:0
})

}

setInterval(spawnEnemy,2500)

function enemyAI(e){

let dx=player.x-e.x
let dy=player.y-e.y
let dist=Math.sqrt(dx*dx+dy*dy)

// держат дистанцию
if(dist<300){
e.x-=dx/dist*0.6
e.y-=dy/dist*0.6
}else{
e.x+=dx/dist*0.4
e.y+=dy/dist*0.4
}

}

function enemyShoot(e){

if(e.type==="red" && e.cool<=0){

enemyBullets.push({
x:e.x,
y:e.y,
vx:(player.x-e.x)/80,
vy:(player.y-e.y)/80,
damage:8
})

e.cool=120
}

}

function update(){

player.x+=move.x
player.y+=move.y

bullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

enemyBullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

}

function collision(){

bullets.forEach(b=>{
enemies.forEach(e=>{
let dx=b.x-e.x
let dy=b.y-e.y
if(Math.sqrt(dx*dx+dy*dy)<15){
e.hp-=b.damage
b.x=-999
}
})
})

enemyBullets.forEach(b=>{
let dx=b.x-player.x
let dy=b.y-player.y
if(Math.sqrt(dx*dx+dy*dy)<15){
player.hp-=b.damage
b.x=-999
}
})

enemies=enemies.filter(e=>e.hp>0)

}

function draw(){

ctx.clearRect(0,0,1200,700)

ctx.fillStyle="#2f8f4e"
ctx.fillRect(0,0,mapSize.w,mapSize.h)

// игрок
ctx.fillStyle="blue"
ctx.beginPath()
ctx.arc(player.x,player.y,18,0,Math.PI*2)
ctx.fill()

// враги
enemies.forEach(e=>{
ctx.fillStyle=e.type==="red"?"red":
e.type==="green"?"lime":"purple"
ctx.beginPath()
ctx.arc(e.x,e.y,15,0,Math.PI*2)
ctx.fill()
})

// пули
ctx.fillStyle="yellow"
bullets.forEach(b=>ctx.fillRect(b.x,b.y,6,3))

ctx.fillStyle="orange"
enemyBullets.forEach(b=>ctx.fillRect(b.x,b.y,5,5))

}

function hpUpdate(){

document.getElementById("hp").style.width=(player.hp/200*100)+"%"

if(player.hp<=0){
location.reload()
}

}

function loop(){

enemies.forEach(e=>{
e.cool--
enemyAI(e)
enemyShoot(e)
})

update()
collision()
draw()
hpUpdate()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

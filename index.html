<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile Arena</title>

<style>
body{
margin:0;
overflow:hidden;
background:#1a1a1a;
touch-action:none; /* 🔒 запрещает двигать экран */
}

canvas{
display:block;
background:#2e8b57;
}

#shoot,#super{
position:absolute;
bottom:40px;
width:85px;
height:85px;
border-radius:50%;
color:white;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
user-select:none;
}

#shoot{
right:40px;
background:rgba(255,60,60,0.8);
}

#super{
right:140px;
background:rgba(60,120,255,0.8);
}

#joystick{
position:absolute;
left:40px;
bottom:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}
</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<div id="joystick"></div>
<div id="shoot">🔥</div>
<div id="super">⭐</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={
x:200,y:250,speed:3,hp:100
}

let move={x:0,y:0}
let bullets=[]
let enemyBullets=[]
let enemies=[]
let superReady=true

let walls=[
{x:350,y:120,w:60,h:260},
{x:600,y:220,w:250,h:50}
]

for(let i=0;i<6;i++){
enemies.push({
x:500+Math.random()*300,
y:100+Math.random()*300,
hp:60,
cool:0
})
}

document.getElementById("shoot").addEventListener("touchstart",shoot)
document.getElementById("super").addEventListener("touchstart",superAttack)

function shoot(){

for(let i=0;i<3;i++){ // автомат

bullets.push({
x:player.x,
y:player.y,
vx:6,
vy:(Math.random()-0.5)*2
})

}

playSound()

}

function superAttack(){

if(!superReady) return

for(let i=0;i<20;i++){

bullets.push({
x:player.x,
y:player.y,
vx:Math.cos(i)*7,
vy:Math.sin(i)*7
})

}

superReady=false
setTimeout(()=>superReady=true,5000)

}

function playSound(){

let audio=new Audio("https://actions.google.com/sounds/v1/weapons/laser_shot.ogg")
audio.volume=0.3
audio.play()

}

function enemyShoot(e){

let dx=player.x-e.x
let dy=player.y-e.y
let angle=Math.atan2(dy,dx)

for(let i=-2;i<=2;i++){ // дробовик

enemyBullets.push({
x:e.x,
y:e.y,
vx:Math.cos(angle+i*0.2)*5,
vy:Math.sin(angle+i*0.2)*5
})

}

}

function updateEnemies(){

enemies.forEach(e=>{

let dx=player.x-e.x
let dy=player.y-e.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist>0){

e.x+=dx/dist*0.7
e.y+=dy/dist*0.7

}

e.cool--
if(e.cool<=0){
enemyShoot(e)
e.cool=120
}

})

}

function updateBullets(){

bullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

enemyBullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

}

function collision(){

bullets.forEach(b=>{
enemies.forEach(e=>{
let dx=b.x-e.x
let dy=b.y-e.y
if(Math.sqrt(dx*dx+dy*dy)<15){
e.hp-=20
b.x=-999
}
})
})

enemyBullets.forEach(b=>{
let dx=b.x-player.x
let dy=b.y-player.y
if(Math.sqrt(dx*dx+dy*dy)<15){
player.hp-=10
b.x=-999
}
})

enemies=enemies.filter(e=>e.hp>0)

}

function drawMap(){

// текстура
for(let x=0;x<900;x+=40){
for(let y=0;y<500;y+=40){
ctx.strokeStyle="rgba(0,0,0,0.1)"
ctx.strokeRect(x,y,40,40)
}
}

walls.forEach(w=>{
ctx.fillStyle="#555"
ctx.fillRect(w.x,w.y,w.w,w.h)
})

}

function draw(){

ctx.clearRect(0,0,900,500)

drawMap()

// игрок
ctx.fillStyle="blue"
ctx.beginPath()
ctx.arc(player.x,player.y,15,0,Math.PI*2)
ctx.fill()

// пули
ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,6,3)
})

ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.fillRect(b.x,b.y,5,5)
})

// враги
ctx.fillStyle="darkred"
enemies.forEach(e=>{
ctx.beginPath()
ctx.arc(e.x,e.y,15,0,Math.PI*2)
ctx.fill()
})

}

function loop(){

player.x+=move.x
player.y+=move.y

updateEnemies()
updateBullets()
collision()

draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

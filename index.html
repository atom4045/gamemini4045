<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Clash Royale</title>
    <style>
        body { margin: 0; background: #050510; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10; }
        .card { 
            width: 70px; height: 100px; background: #1a1a3a; border: 2px solid #0ff; 
            border-radius: 8px; display: flex; flex-direction: column; align-items: center;
            justify-content: space-around; font-size: 10px; cursor: pointer; transition: 0.2s;
        }
        .card:active { transform: scale(0.9); }
        .card b { font-size: 12px; color: #f0f; }
        #elixir-bar { 
            position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 15px; background: #222; border: 2px solid #fff; border-radius: 10px;
        }
        #elixir-fill { height: 100%; background: #f0f; width: 0%; transition: 0.1s; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: #0ff; font-weight: bold; }
        canvas { display: block; margin: 0 auto; background: #0a0a20; }
    </style>
</head>
<body>

<div id="info">НЕОНОВАЯ АРЕНА: ИГРОК VS БОТ</div>
<div id="elixir-bar"><div id="elixir-fill"></div></div>

<div id="game-ui">
    <div class="card" onclick="selectCard(0)"><b>3</b> ⚔️<span>РЫЦАРЬ</span></div>
    <div class="card" onclick="selectCard(1)"><b>3</b> 🏹<span>ЛУЧНИК</span></div>
    <div class="card" onclick="selectCard(2)"><b>5</b> 🛡️<span>ГИГАНТ</span></div>
    <div class="card" onclick="selectCard(3)"><b>4</b> 🔥<span>ШАР</span></div>
</div>

<canvas id="arena"></canvas>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = 600;

let elixir = 5;
let selectedTrack = -1;
let units = [];
let towers = [];
let particles = [];

const CARD_DATA = [
    { name: "Рыцарь", cost: 3, hp: 600, dmg: 50, range: 30, spd: 1.2, type: 'ground' },
    { name: "Лучник", cost: 3, hp: 250, dmg: 40, range: 150, spd: 1.0, type: 'range' },
    { name: "Гигант", cost: 5, hp: 2000, dmg: 80, range: 40, spd: 0.6, type: 'tank' },
    { name: "Шар", cost: 4, dmg: 300, isSpell: true }
];

// Инициализация башен
function initTowers() {
    towers = [
        // Игрок (синие)
        { x: 100, y: 500, hp: 1500, maxHp: 1500, team: 1, r: 25 },
        { x: 300, y: 500, hp: 1500, maxHp: 1500, team: 1, r: 25 },
        { x: 200, y: 560, hp: 2500, maxHp: 2500, team: 1, r: 35, main: true },
        // Бот (красные)
        { x: 100, y: 100, hp: 1500, maxHp: 1500, team: 2, r: 25 },
        { x: 300, y: 100, hp: 1500, maxHp: 1500, team: 2, r: 25 },
        { x: 200, y: 40, hp: 2500, maxHp: 2500, team: 2, r: 35, main: true }
    ];
}

function spawnUnit(cardIdx, team, x, y) {
    const data = CARD_DATA[cardIdx];
    if (data.isSpell) {
        units.push({ ...data, x, y, team, timer: 30 });
        // Урон по области
        units.forEach(u => {
            if (u.team !== team && Math.hypot(u.x - x, u.y - y) < 80) u.hp -= data.dmg;
        });
        towers.forEach(t => {
            if (t.team !== team && Math.hypot(t.x - x, t.y - y) < 80) t.hp -= data.dmg;
        });
        return;
    }
    units.push({
        ...data, x, y, team,
        curHp: data.hp,
        target: null,
        state: 'move'
    });
}

function selectCard(idx) {
    if (elixir >= CARD_DATA[idx].cost) {
        selectedCard = idx;
    }
}

canvas.onclick = (e) => {
    if (selectedCard !== -1) {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        if (y > 300 || CARD_DATA[selectedCard].isSpell) {
            spawnUnit(selectedCard, 1, x, y);
            elixir -= CARD_DATA[selectedCard].cost;
            selectedCard = -1;
        }
    }
};

// Простой ИИ Бота
let botElixir = 5;
function botAI() {
    botElixir += 0.01;
    if (botElixir >= 5) {
        const strategy = Math.random();
        const spawnX = 50 + Math.random() * 300;
        if (strategy > 0.6) spawnUnit(2, 2, spawnX, 50); // Гигант
        else if (strategy > 0.3) spawnUnit(0, 2, spawnX, 50); // Рыцарь
        else spawnUnit(1, 2, spawnX, 50); // Лучник
        botElixir -= 3.5;
    }
}

function update() {
    elixir = Math.min(10, elixir + 0.015);
    document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';
    botAI();

    units.forEach((u, i) => {
        if (u.isSpell) { u.timer--; if(u.timer <= 0) units.splice(i, 1); return; }

        // Поиск цели (башня или юнит)
        let targets = [...towers, ...units].filter(t => t.team !== u.team && t.curHp !== 0 && !t.isSpell);
        let closest = null;
        let minDist = Infinity;

        targets.forEach(t => {
            let d = Math.hypot(u.x - t.x, u.y - t.y);
            if (d < minDist) { minDist = d; closest = t; }
        });

        if (closest) {
            if (minDist > u.range) {
                let angle = Math.atan2(closest.y - u.y, closest.x - u.x);
                u.x += Math.cos(angle) * u.spd;
                u.y += Math.sin(angle) * u.spd;
            } else {
                // Атака
                if (tick % 60 === 0) {
                    closest.curHp ? closest.curHp -= u.dmg : closest.hp -= u.dmg;
                }
            }
        }
    });

    units = units.filter(u => u.isSpell || u.curHp > 0);
    towers = towers.filter(t => t.hp > 0);
    
    if (!towers.find(t => t.main && t.team === 1)) alert("ВЫ ПРОИГРАЛИ!");
    if (!towers.find(t => t.main && t.team === 2)) alert("ПОБЕДА!");
}

let tick = 0;
function draw() {
    tick++;
    ctx.fillStyle = '#0a0a20'; ctx.fillRect(0,0,400,600);
    
    // Река и мосты
    ctx.fillStyle = '#111144'; ctx.fillRect(0, 280, 400, 40);
    ctx.fillStyle = '#333'; ctx.fillRect(60, 270, 60, 60); ctx.fillRect(280, 270, 60, 60);

    // Башни
    towers.forEach(t => {
        ctx.fillStyle = t.team === 1 ? '#0ff' : '#f00';
        ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillRect(t.x - 20, t.y - t.r - 10, 40, 5);
        ctx.fillStyle = "#f0f"; ctx.fillRect(t.x - 20, t.y - t.r - 10, (t.hp/t.maxHp)*40, 5);
    });

    // Юниты
    units.forEach(u => {
        if (u.isSpell) {
            ctx.fillStyle = 'rgba(255,100,0,0.5)';
            ctx.beginPath(); ctx.arc(u.x, u.y, 80, 0, 7); ctx.fill();
            return;
        }
        ctx.fillStyle = u.team === 1 ? '#0af' : '#f55';
        ctx.beginPath(); ctx.arc(u.x, u.y, 10 + (u.type==='tank'?10:0), 0, 7); ctx.fill();
        // HP бар юнита
        ctx.fillStyle = "#f00"; ctx.fillRect(u.x-10, u.y-15, 20, 3);
        ctx.fillStyle = "#0f0"; ctx.fillRect(u.x-10, u.y-15, (u.curHp/u.hp)*20, 3);
    });

    update();
    requestAnimationFrame(draw);
}

initTowers();
draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Clash: Toxic Combo</title>
    <style>
        body { margin: 0; background: #010105; color: white; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        canvas { display: block; background: #050510; box-shadow: 0 0 20px #0ff; }
        #ui { position: absolute; bottom: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; }
        #cards { display: flex; gap: 8px; }
        .card { 
            width: 70px; height: 95px; background: rgba(10, 10, 40, 0.9); border: 2px solid #0ff; 
            border-radius: 8px; display: flex; flex-direction: column; align-items: center;
            justify-content: space-around; font-size: 11px; cursor: pointer; transition: 0.1s;
        }
        .card:active { transform: scale(0.9); background: rgba(0, 255, 255, 0.2); }
        .card b { font-size: 16px; color: #f0f; }
        #elixir-bar { width: 300px; height: 12px; background: #111; border: 2px solid #fff; border-radius: 6px; overflow: hidden; }
        #elixir-fill { height: 100%; background: linear-gradient(90deg, #f0f, #ff00ff); width: 0%; transition: 0.1s; }
        #combo-info { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 12px; max-width: 150px; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>

<div id="combo-info">КОМБО-СЧЁТЧИК:<br><span id="c-l">🏹 0/3</span> | <span id="c-r">⚔️ 0/3</span></div>

<div id="ui">
    <div id="elixir-bar"><div id="elixir-fill"></div></div>
    <div id="cards">
        <div class="card" onclick="selectCard(0)"><b>3</b> ⚔️РЫЦАРЬ</div>
        <div class="card" onclick="selectCard(1)"><b>3</b> 🏹ЛУЧНИЦА</div>
        <div class="card" onclick="selectCard(2)"><b>5</b> 🛡️ГИГАНТ</div>
        <div class="card" onclick="selectCard(3)"><b>4</b> 🔥ШАР</div>
    </div>
</div>

<canvas id="arena"></canvas>

<script>
// --- AUDIO (BASIC SYNTH) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(f, d, t='sine', v=0.2) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

// --- CANVAS SETUP ---
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
canvas.width = 400; canvas.height = Math.min(650, window.innerHeight);

// --- GAME DATA ---
const CARD_DATA = [
    { n: "Рыцарь", c: 3, hp: 800, dmg: 70, range: 40, spd: 1.4, type: 'g' },
    { n: "Лучник", c: 3, hp: 300, dmg: 45, range: 160, spd: 1.1, type: 'r' },
    { n: "Гигант", c: 5, hp: 2500, dmg: 100, range: 50, spd: 0.7, type: 't' },
    { n: "Шар", c: 4, isSpell: true, dmg: 400, r: 80 }
];
const TOXIC_DATA = { n: "ТАКСИЧНЫЙ", hp: 1500, dmg: 3, range: 120, spd: 1.0, type: 'hero' };

// --- STATE VARIABLES ---
let elixir = 6;
let selectedCard = -1;
let units = [], towers = [], spells = [], particles = [];
let tick = 0, isEnd = false;

// Комбо-система
let comboArchers = 0, comboKnights = 0;

// Инициализация башен
function initTowers() {
    towers = [
        { x: 100, y: canvas.height-120, hp: 2000, max: 2000, team: 1, r: 25 },
        { x: 300, y: canvas.height-120, hp: 2000, max: 2000, team: 1, r: 25 },
        { x: 200, y: canvas.height-50, hp: 3500, max: 3500, team: 1, r: 35, main: true },
        { x: 100, y: 120, hp: 2000, max: 2000, team: 2, r: 25 },
        { x: 300, y: 120, hp: 2000, max: 2000, team: 2, r: 25 },
        { x: 200, y: 50, hp: 3500, max: 3500, team: 2, r: 35, main: true }
    ];
}

function selectCard(idx) {
    if (elixir >= CARD_DATA[idx].cost) {
        selectedCard = idx;
        playSound(400, 0.1, 'sine', 0.1);
    }
}

function spawnUnit(card, team, x, y) {
    if(card.isSpell) {
        spells.push({ ...card, startY: -50, x, y, team, timer: 60, landTimer: 30 });
        playSound(100, 0.3, 'square');
    } else {
        units.push({ ...card, x, y, team, curHp: card.hp, aTick: 0, state: 'move', reload: 0 });
    }
}

// Удар Огненного Шара
function spellDamage(x, y, data, team) {
    units.forEach(u => {
        if(u.team !== team && Math.hypot(u.x-x, u.y-y) < data.r) u.curHp -= data.dmg;
    });
    towers.forEach(t => {
        if(t.team !== team && Math.hypot(t.x-x, t.y-y) < data.r) t.hp -= data.dmg;
    });
    for(let i=0; i<30; i++) spawnParticle(x, y, '#ff0', 3, 40);
}

// ТОКСИЧНОЕ ОБЛАКО
function toxicDamage(x, y, r, team) {
    units.forEach(u => {
        if(u.team !== team && Math.hypot(u.x-x, u.y-y) < r) {
            u.curHp -= 4; // Огромный периодический урон
            if(tick % 5 === 0) spawnParticle(u.x, u.y, '#0f0', 1, 20);
        }
    });
    if(tick % 10 === 0) spawnParticle(x+(Math.random()-0.5)*r*1.5, y+(Math.random()-0.5)*r*1.5, '#0a0', 1, 30);
}

canvas.onclick = (e) => {
    if(selectedCard === -1) return;
    const data = CARD_DATA[selectedCard];
    if (elixir < data.cost) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (y > canvas.height/2 || data.isSpell) {
        spawnUnit(data, 1, x, y);
        elixir -= data.cost;
        updateCombo(selectedCard);
        selectedCard = -1;
    }
};

function updateCombo(idx) {
    // 🏹 Лучник подряд -> ⚔️ Рыцарь подряд
    if(idx === 1 && comboKnights === 0) {
        comboArchers++;
        if(comboArchers >= 3) {
            spawnUnit(TOXIC_DATA, 1, 200, canvas.height-80);
            comboArchers = 0;
            playSound(150, 1.0, 'sawtooth'); // Токсичный звук
        }
    } else if (idx === 0 && comboArchers === 0) {
        comboKnights++;
        // Просто комбо рыцарей, пока без секретного героя
        if(comboKnights >= 3) comboKnights = 0;
    } else {
        // Комбо прервано
        comboArchers = comboKnights = 0;
    }
    document.getElementById('c-l').innerText = `🏹 ${comboArchers}/3`;
}

// Простой ИИ Бота
let botElixir = 6;
function botAI() {
    botElixir += isEnd ? 0.005 : 0.02;
    if(botElixir >= 7) {
        let card = Math.random() > 0.4 ? 0 : 2; // Рыцарь или Гигант
        spawnUnit(CARD_DATA[card], 2, 50+Math.random()*300, 80);
        botElixir -= CARD_DATA[card].cost;
    }
}

// Particle system
function spawnParticle(x, y, color, speed, dur) {
    particles.push({ x, y, vx:(Math.random()-0.5)*speed, vy:(Math.random()-0.5)*speed, color, dur });
}

function update() {
    tick++;
    if(isEnd) return;
    elixir = Math.min(10, elixir + 0.02);
    document.getElementById('elixir-fill').style.width = (elixir*10)+'%';
    botAI();

    // Спеллы
    spells.forEach((s, i) => {
        s.startY += 10;
        if(s.startY >= s.y) {
            spellDamage(s.x, s.y, s, s.team);
            spells.splice(i, 1);
            playSound(80, 0.4, 'sawtooth', 0.5);
        }
    });

    // Юниты
    units.forEach((u, i) => {
        if(u.ability === 'poison') toxicDamage(u.x, u.y, u.range, u.team);

        let targets = [...towers, ...units].filter(t => t.team !== u.team && t.hp > 0 && !t.isSpell);
        let closest = null, minDist = Infinity;
        
        targets.forEach(t => {
            let d = Math.hypot(u.x - t.x, u.y - t.y);
            if(d < minDist) { minDist = d; closest = t; }
        });

        if(closest) {
            if(minDist > u.range) {
                let a = Math.atan2(closest.y - u.y, closest.x - u.x);
                u.x += Math.cos(a) * u.spd;
                u.y += Math.sin(a) * u.spd;
                u.state = 'move';
            } else {
                // Атака
                u.state = 'attack';
                u.reload--;
                if(u.reload <= 0) {
                    closest.curHp ? closest.curHp -= u.dmg : closest.hp -= u.dmg;
                    u.reload = 60; // Частота атаки
                    playSound(100+Math.random()*20, 0.05, 'triangle');
                    if(u.type==='r') spawnParticle(u.x, u.y, '#fff', 2, 10);
                    if(u.n==='ТАКСИЧНЫЙ') spawnParticle(u.x, u.y, '#0f0', 3, 20);
                }
            }
        }
    });

    units = units.filter(u => u.curHp > 0);
    towers.filter(t => t.team===1).every(t => t.hp<=0) && endGame(2);
    towers.filter(t => t.team===2).every(t => t.hp<=0) && endGame(1);
}

function endGame(winner) {
    isEnd = true;
    alert(winner === 1 ? "ПОБЕДА!" : "ВЫ ПРОИГРАЛИ!");
    location.reload();
}

// DRAWING FUNCTIONS
function drawUnit(ctx, u) {
    ctx.save();
    ctx.translate(u.x, u.y);
    const color = u.team === 1 ? '#0ff' : '#f00';
    const face = u.team === 1 ? -1 : 1; // Костыль для направления

    if (u.ability === 'poison') {
        // ТАКСИЧНЫЙ
        ctx.fillStyle = '#0a0'; ctx.fillRect(-15, -15, 30, 30);
        ctx.fillStyle = '#000'; ctx.fillRect(-5, -5, 10, 10); // Противогаз
        if(tick % 5 === 0) ctx.fillStyle = `rgba(0, 255, 0, ${Math.random()})`;
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, 7); ctx.fill();
    } 
    else if (u.type === 't') {
        // ГИГАНТ
        let step = (tick % 40 < 20) ? -5 : 5;
        ctx.fillStyle = color; ctx.fillRect(-20, -30 + step, 40, 50);
        ctx.fillStyle = '#ff0'; ctx.fillRect(-10, -40 + step, 20, 15); // Голова
    }
    else if (u.type === 'g') {
        // РЫЦАРЬ
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, -10, 15, 0, 7); ctx.fill();
        // Замах мечом
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
        ctx.beginPath();
        let angle = u.state === 'attack' ? Math.sin(tick*0.2)*Math.PI/2 : Math.PI/2;
        ctx.moveTo(0, -10); ctx.lineTo(Math.cos(angle)*30, Math.sin(angle)*30*face);
        ctx.stroke();
    }
    else if (u.type === 'r') {
        // ЛУЧНИЦА
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, 0, 10, 0, 7); ctx.fill();
        // Лук и тетива
        ctx.strokeStyle = '#f0f'; ctx.lineWidth = 2;
        let pull = u.state === 'attack' ? Math.sin(tick*0.1)*10 : 0;
        ctx.beginPath(); ctx.arc(-10+pull, 0, 15, -1, 1); ctx.stroke();
        ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(-10+pull, -15); ctx.lineTo(-10, 0); ctx.lineTo(-10+pull, 15); ctx.stroke();
    }

    // HP bar юнита
    ctx.fillStyle = "#f00"; ctx.fillRect(-15, -35, 30, 4);
    ctx.fillStyle = "#0f0"; ctx.fillRect(-15, -35, (u.curHp/u.hp)*30, 4);
    ctx.restore();
}

function draw() {
    ctx.fillStyle = '#050510'; ctx.fillRect(0,0,400,canvas.height);
    
    // Река и мосты
    ctx.fillStyle = '#03032a'; ctx.fillRect(0, canvas.height/2-20, 400, 40);
    ctx.fillStyle = '#222'; ctx.fillRect(50, canvas.height/2-30, 80, 60); ctx.fillRect(270, canvas.height/2-30, 80, 60);

    // Башни
    towers.forEach(t => {
        ctx.fillStyle = t.team === 1 ? '#0ff' : '#f00';
        ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillRect(t.x-20, t.y-t.r-10, 40, 5);
        ctx.fillStyle = "#f0f"; ctx.fillRect(t.x-20, t.y-t.r-10, (t.hp/t.max)*40, 5);
    });

    // Огненные шары
    spells.forEach(s => {
        ctx.fillStyle = '#f20'; ctx.beginPath(); ctx.arc(s.x, s.startY, 20, 0, 7); ctx.fill();
        ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(s.x, s.startY, 10, 0, 7); ctx.fill();
        if(tick%2===0) spawnParticle(s.x, s.startY, '#ff0', 1, 10);
    });

    // Юниты
    units.forEach(u => drawUnit(ctx, u));

    // Частицы
    particles.forEach((p, i) => {
        ctx.fillStyle = p.color; ctx.globalAlpha = p.dur/40; ctx.fillRect(p.x, p.y, 4, 4);
        p.x += p.vx; p.y += p.vy; p.dur--;
        if(p.dur<=0) particles.splice(i,1);
    });
    ctx.globalAlpha = 1;

    update();
    requestAnimationFrame(draw);
}

initTowers();
draw();
</script>
</body>
</html>

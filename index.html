<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Neon: Mega Update</title>
    <style>
        body { margin: 0; background: #02020a; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; background: #050510; }
        #ui { position: absolute; bottom: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 10; }
        #cards { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .card { 
            width: 60px; height: 85px; background: #1a1a3a; border: 2px solid #0ff; 
            border-radius: 6px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-size: 9px; cursor: pointer; text-align: center;
        }
        .card b { font-size: 14px; color: #f0f; display: block; }
        #elixir-bar { width: 300px; height: 12px; background: #111; border: 1px solid #fff; border-radius: 6px; overflow: hidden; }
        #elixir-fill { height: 100%; background: #f0f; width: 0%; transition: 0.1s; }
    </style>
</head>
<body>

<div id="ui">
    <div id="elixir-bar"><div id="elixir-fill"></div></div>
    <div id="cards">
        <div class="card" onclick="selectCard(0)"><b>3</b> ⚔️РЫЦАРЬ</div>
        <div class="card" onclick="selectCard(1)"><b>3</b> 🏹ЛУЧНИЦА</div>
        <div class="card" onclick="selectCard(2)"><b>6</b> 🌑МЕГА</div>
        <div class="card" onclick="selectCard(3)"><b>7</b> 🦇ГОНЧА</div>
        <div class="card" onclick="selectCard(4)"><b>2</b> 🐷СВИНЬЯ</div>
    </div>
</div>

<canvas id="arena"></canvas>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
canvas.width = 400; canvas.height = window.innerHeight;

let elixir = 6;
let selectedCard = -1;
let units = [], towers = [], projectiles = [], particles = [];
let tick = 0;

const CARD_DATA = [
    { n: "Рыцарь", c: 3, hp: 800, dmg: 70, range: 40, spd: 1.2, type: 'g' },
    { n: "Лучник", c: 3, hp: 300, dmg: 40, range: 160, spd: 1.0, type: 'r' },
    { n: "Меганайт", c: 6, hp: 3200, dmg: 120, range: 50, spd: 0.8, type: 'm' },
    { n: "Гонча", c: 7, hp: 2000, dmg: 60, range: 40, spd: 0.6, type: 'h', flying: true },
    { n: "Свинья", c: 2, hp: 200, dmg: 300, range: 30, spd: 1.6, type: 'p', kamikaze: true }
];

function initTowers() {
    towers = [
        { x: 100, y: canvas.height-150, hp: 2000, m: 2000, team: 1, r: 25, reload: 0 },
        { x: 300, y: canvas.height-150, hp: 2000, m: 2000, team: 1, r: 25, reload: 0 },
        { x: 200, y: canvas.height-60, hp: 4000, m: 4000, team: 1, r: 35, main: true, reload: 0 },
        { x: 100, y: 150, hp: 2000, m: 2000, team: 2, r: 25, reload: 0 },
        { x: 300, y: 150, hp: 2000, m: 2000, team: 2, r: 25, reload: 0 },
        { x: 200, y: 60, hp: 4000, m: 4000, team: 2, r: 35, main: true, reload: 0 }
    ];
}

function selectCard(idx) { if(elixir >= CARD_DATA[idx].c) selectedCard = idx; }

canvas.onclick = (e) => {
    if(selectedCard === -1) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    if(y > canvas.height/2 || CARD_DATA[selectedCard].flying) {
        units.push({...CARD_DATA[selectedCard], x, y, curHp: CARD_DATA[selectedCard].hp, team: 1, reload: 0});
        elixir -= CARD_DATA[selectedCard].c;
        selectedCard = -1;
    }
};

function update() {
    tick++;
    elixir = Math.min(10, elixir + 0.02);
    document.getElementById('elixir-fill').style.width = (elixir*10)+'%';

    // Башни стреляют
    towers.forEach(t => {
        t.reload--;
        if(t.reload <= 0) {
            let targets = units.filter(u => u.team !== t.team);
            for(let u of targets) {
                let d = Math.hypot(t.x-u.x, t.y-u.y);
                if(d < 250) {
                    projectiles.push({x: t.x, y: t.y, tx: u.x, ty: u.y, timer: 10, team: t.team});
                    u.curHp -= 15;
                    t.reload = 40;
                    break;
                }
            }
        }
    });

    // Юниты
    units.forEach(u => {
        let targets = (u.type === 'h') ? towers.filter(t => t.team !== u.team) : [...towers, ...units].filter(x => x.team !== u.team && x.hp > 0);
        let closest = null, minDist = Infinity;
        targets.forEach(t => {
            let d = Math.hypot(u.x-t.x, u.y-t.y);
            if(d < minDist) { minDist = d; closest = t; }
        });

        if(closest) {
            if(minDist > u.range) {
                let a = Math.atan2(closest.y-u.y, closest.x-u.x);
                u.x += Math.cos(a)*u.spd; u.y += Math.sin(a)*u.spd;
            } else {
                u.reload--;
                if(u.reload <= 0) {
                    if(u.kamikaze) { closest.curHp ? closest.curHp -= u.dmg : closest.hp -= u.dmg; u.curHp = 0; }
                    else { closest.curHp ? closest.curHp -= u.dmg : closest.hp -= u.dmg; u.reload = 60; }
                }
            }
        }
    });

    units = units.filter(u => u.curHp > 0);
    towers = towers.filter(t => t.hp > 0);
    projectiles = projectiles.filter(p => p.timer-- > 0);
}

function draw() {
    ctx.fillStyle = '#050510'; ctx.fillRect(0,0,400,canvas.height);
    
    // Рисуем башни с пушками
    towers.forEach(t => {
        ctx.fillStyle = t.team === 1 ? '#0ff' : '#f0f';
        ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, 7); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillRect(t.x-5, t.y-t.r-5, 10, 10); // Пушка
        ctx.fillStyle = 'red'; ctx.fillRect(t.x-20, t.y-t.r-15, (t.hp/t.m)*40, 4);
    });

    // Юниты
    units.forEach(u => {
        ctx.fillStyle = u.team === 1 ? '#0af' : '#f55';
        if(u.type === 'm') ctx.fillRect(u.x-20, u.y-20, 40, 40); // Меганайт
        else if(u.type === 'h') { ctx.beginPath(); ctx.arc(u.x, u.y, 18, 0, 7); ctx.fill(); ctx.fillStyle='#f60'; ctx.fill(); } // Гонча
        else { ctx.beginPath(); ctx.arc(u.x, u.y, 12, 0, 7); ctx.fill(); }
        ctx.fillStyle='lime'; ctx.fillRect(u.x-10, u.y-25, (u.curHp/u.hp)*20, 3);
    });

    // Выстрелы башен
    projectiles.forEach(p => {
        ctx.strokeStyle = p.team === 1 ? '#0ff' : '#f0f';
        ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke();
    });

    update();
    requestAnimationFrame(draw);
}

initTowers();
draw();
</script>
</body>
</html>

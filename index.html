<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Mobile Battle</title>

<style>
body{
margin:0;
overflow:hidden;
touch-action:none;
background:#111;
}

canvas{
display:block;
}

#hpBar{
position:absolute;
top:10px;
left:10px;
width:220px;
height:18px;
background:#444;
}

#hp{
height:100%;
width:100%;
background:lime;
}

#joystick{
position:absolute;
left:25px;
bottom:25px;
width:160px;
height:160px;
background:rgba(255,255,255,0.15);
border-radius:50%;
}

#stick{
position:absolute;
left:85px;
bottom:85px;
width:70px;
height:70px;
background:rgba(255,255,255,0.5);
border-radius:50%;
}

#shoot{
position:absolute;
right:25px;
bottom:30px;
width:90px;
height:90px;
border-radius:50%;
background:red;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

#super{
position:absolute;
right:35px;
bottom:140px;
width:70px;
height:70px;
border-radius:50%;
background:blue;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="hpBar"><div id="hp"></div></div>
<div id="joystick"></div>
<div id="stick"></div>
<div id="shoot">🔥</div>
<div id="super">⭐</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let mapSize={w:4000,h:3000}

let player={
x:2000,
y:1500,
hp:200
}

let move={x:0,y:0}
let bullets=[]
let enemies=[]

function spawnEnemy(){

let x=Math.random()*(mapSize.w-200)+100
let y=Math.random()*(mapSize.h-200)+100

enemies.push({
x:x,
y:y,
hp:60,
cool:0
})

}

setInterval(spawnEnemy,2000)

document.getElementById("shoot").addEventListener("touchstart",()=>{

bullets.push({
x:player.x,
y:player.y,
vx:10,
vy:0,
damage:15
})

})

document.getElementById("super").addEventListener("touchstart",()=>{

for(let i=0;i<20;i++){
bullets.push({
x:player.x,
y:player.y,
vx:Math.cos(i)*8,
vy:Math.sin(i)*8,
damage:25
})
}

})

let joystick=document.getElementById("joystick")

joystick.addEventListener("touchmove",e=>{

let t=e.touches[0]
let rect=joystick.getBoundingClientRect()

let x=t.clientX-(rect.left+80)
let y=t.clientY-(rect.top+80)

move.x=x/50
move.y=y/50

})

joystick.addEventListener("touchend",()=>{
move.x=0
move.y=0
})

function update(){

player.x+=move.x
player.y+=move.y

// границы карты
player.x=Math.max(0,Math.min(mapSize.w,player.x))
player.y=Math.max(0,Math.min(mapSize.h,player.y))

bullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

}

function enemyAI(e){

let dx=player.x-e.x
let dy=player.y-e.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<500){

e.x+=dx/dist*0.6
e.y+=dy/dist*0.6

}

}

function collision(){

bullets.forEach(b=>{
enemies.forEach(e=>{
let dx=b.x-e.x
let dy=b.y-e.y
if(Math.sqrt(dx*dx+dy*dy)<15){
e.hp-=b.damage
b.x=-999
}
})
})

enemies=enemies.filter(e=>e.hp>0)

}

function camera(){

ctx.setTransform(1,0,0,1,0,0)

let camX=player.x-canvas.width/2
let camY=player.y-canvas.height/2

ctx.translate(-camX,-camY)

}

function draw(){

ctx.clearRect(0,0,mapSize.w,mapSize.h)

camera()

ctx.fillStyle="#2f8f4e"
ctx.fillRect(0,0,mapSize.w,mapSize.h)

// игрок
ctx.fillStyle="blue"
ctx.beginPath()
ctx.arc(player.x,player.y,18,0,Math.PI*2)
ctx.fill()

// враги
enemies.forEach(e=>{
ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(e.x,e.y,15,0,Math.PI*2)
ctx.fill()
})

// пули
ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,6,3)
})

}

function hpUpdate(){

document.getElementById("hp").style.width=(player.hp/200*100)+"%"

if(player.hp<=0){
location.reload()
}

}

function loop(){

update()
collision()
draw()
hpUpdate()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

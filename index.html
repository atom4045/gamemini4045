<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hatamal: Cyber-Pig Evolution</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Courier New', monospace; touch-action: manipulation; color: #fff; }
        canvas { display: block; background: radial-gradient(circle, #0a0a20 0%, #020205 100%); }
        #ui {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0, 0, 0, 0.85); padding: 12px; border: 1px solid #0ff;
            border-radius: 4px; pointer-events: none; z-index: 10; box-shadow: 0 0 10px #0ff;
        }
        #stage-name { font-size: 1.2em; color: #0ff; text-shadow: 0 0 5px #0ff; }
        #xp-bar-container { width: 180px; height: 8px; background: #111; border: 1px solid #555; margin-top: 5px; }
        #xp-bar-fill { height: 100%; background: #0f0; width: 0%; box-shadow: 0 0 8px #0f0; }
        #controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 10;
        }
        .btn {
            width: 75px; height: 75px; background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: #0ff;
            font-size: 28px; font-weight: bold; user-select: none;
        }
        .btn:active { background: rgba(0, 255, 255, 0.4); }
        #screamer {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="stage-name">LOADING...</div>
    <div id="xp-bar-container"><div id="xp-bar-fill"></div></div>
    <div id="status" style="font-size: 0.8em; color: #f0f; margin-top: 4px;"></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <div style="display: flex; gap: 15px;">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="btn" id="btnFly" style="border-color: #f0f; color: #f0f;">FLY</div>
</div>

<div id="screamer">
    <div style="font-size: 400px; filter: drop-shadow(0 0 30px red);">🐷</div>
    <h1 style="color: red; position: absolute; bottom: 10%; font-size: 3em;">ХРЮ-ХРЮ-ХРЮ!!!</h1>
</div>

<script>
// --- ЗВУКОВОЙ ДВИЖОК (БЕЗ БАГОВ) ---
let audioCtx = null;
const playSound = (f, d, t='sine', v=0.1) => {
    if(!audioCtx) return;
    try {
        let o = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e) {}
};

const initAudio = () => {
    if(!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        console.log("Audio Ready");
    }
};

// --- ОСНОВНЫЕ ПЕРЕМЕННЫЕ ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const world = { w: 5000, h: 2500 };
let player = { x: 500, y: 500, vx: 0, vy: 0, level: 0, xp: 0, face: 1 };
let obstacles = [], food = [], tick = 0, isGameOver = false;

// --- ЕДА (НОВЫЙ ВИЗУАЛ) ---
function spawnFood(type) {
    let x = Math.random() * world.w;
    let y = 100 + Math.random() * (world.h - 300);
    // Проверка, чтобы не в здании
    for(let o of obstacles) {
        if(x > o.x-20 && x < o.x+o.w+20 && y > o.y-20) { x += 300; } 
    }
    food.push({ x, y, type, rot: Math.random()*Math.PI, s: Math.random()*5 });
}

// --- ЭВОЛЮЦИИ ---
const evos = [
    { n: "Nano-Bit", xp: 15, s: 15, f: 5, m: 1, d: (x,y,r,t) => {
        ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
        ctx.strokeStyle='#fff'; ctx.strokeRect(x-r, y-2, r*2, 4);
    }},
    { n: "Cyber-Phoenix", xp: 150, s: 50, f: 6.5, m: 5, d: (x,y,r,t) => {
        let w = Math.sin(t*0.2)*r;
        ctx.fillStyle = '#f60'; ctx.beginPath();
        ctx.moveTo(x,y); ctx.lineTo(x-r, y-w); ctx.lineTo(x-r, y+w); ctx.fill(); // Крыло
        ctx.moveTo(x,y); ctx.lineTo(x+r, y-w); ctx.lineTo(x+r, y+w); ctx.fill(); // Крыло
        ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.ellipse(x,y,r/2, r/4, 0,0,7); ctx.fill();
    }},
    { n: "ULTRA MAMA", xp: 1000, s: 180, f: 10, m: 100, d: (x,y,r,t) => {
        ctx.fillStyle = '#ff99cc'; ctx.beginPath(); ctx.ellipse(x,y,r*1.2, r, 0,0,7); ctx.fill();
        ctx.fillStyle = '#ff66aa'; ctx.beginPath(); ctx.arc(x+r*0.7, y-r*0.3, r*0.5, 0, 7); ctx.fill();
        ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(x+r*1.1, y-r*0.4, 15, 0, 7); ctx.fill(); // Глаз
    }}
];

// --- ГЕНЕРАЦИЯ МИРА ---
function init() {
    obstacles = [];
    for(let i=0; i<30; i++) {
        obstacles.push({
            x: 800 + i*500, w: 150 + Math.random()*200, h: 600 + Math.random()*1000,
            c: Math.random() > 0.5 ? '#0ff' : '#f0f'
        });
    }
    for(let i=0; i<100; i++) spawnFood(i%10===0 ? 'big' : 'small');
    resize();
    requestAnimationFrame(loop);
}

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);

// --- УПРАВЛЕНИЕ ---
const keys = {};
const fly = () => { initAudio(); player.vy = -evos[player.level].f; playSound(200, 0.1, 'triangle'); };
document.getElementById('btnFly').ontouchstart = (e) => { e.preventDefault(); fly(); };
document.getElementById('btnLeft').ontouchstart = (e) => { e.preventDefault(); keys.L=true; };
document.getElementById('btnLeft').ontouchend = () => keys.L=false;
document.getElementById('btnRight').ontouchstart = (e) => { e.preventDefault(); keys.R=true; };
document.getElementById('btnRight').ontouchend = () => keys.R=false;
window.onkeydown = (e) => { if(e.code==='Space') fly(); keys[e.code]=true; };
window.onkeyup = (e) => keys[e.code]=false;

// --- ЦИКЛ ИГРЫ ---
function loop() {
    if(isGameOver) return;
    tick++;
    let e = evos[player.level];

    // Физика
    if(keys.ArrowLeft || keys.L) { player.vx -= 0.6; player.face = -1; }
    if(keys.ArrowRight || keys.R) { player.vx += 0.6; player.face = 1; }
    player.vx *= 0.96; player.vy += 0.25;
    player.x += player.vx; player.y += player.vy;

    // Коллизии
    obstacles = obstacles.filter(o => {
        let hit = player.x+e.s > o.x && player.x-e.s < o.x+o.w && player.y+e.s > world.h-o.h;
        if(hit) {
            if(player.level === 2) return false; // Сжираем
            if(player.y < world.h-o.h+50) { player.y = world.h-o.h-e.s; player.vy = 0; }
            else { player.vx *= -1.2; player.x += player.vx; }
        }
        return true;
    });

    if(player.y > world.h-e.s) { player.y = world.h-e.s; player.vy = 0; }
    if(player.x < 0) player.x = 0; if(player.x > world.w) player.x = world.w;

    // Еда
    food = food.filter(f => {
        let dist = Math.hypot(player.x-f.x, player.y-f.y);
        if(dist < e.s + 20) {
            player.xp += (f.type==='small'? 2 : 10) * e.m;
            playSound(600, 0.05);
            spawnFood(f.type); return false;
        }
        return true;
    });

    // Эволюция
    if(player.level < 2 && player.xp >= e.xp) {
        player.level++; player.xp = 0;
        playSound(400, 0.5, 'sawtooth');
    }

    // Скример
    if(player.level === 2 && player.xp >= 1000) {
        isGameOver = true;
        document.getElementById('screamer').style.display = 'flex';
        playSound(100, 2, 'sawtooth', 0.5);
        for(let i=0; i<10; i++) setTimeout(() => playSound(50, 0.5, 'square'), i*200);
    }

    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let camX = player.x - canvas.width/2;
    let camY = player.y - canvas.height/2;
    ctx.save(); ctx.translate(-camX, -camY);

    // Здания
    obstacles.forEach(o => {
        ctx.fillStyle = '#050510'; ctx.fillRect(o.x, world.h-o.h, o.w, o.h);
        ctx.strokeStyle = o.c; ctx.lineWidth = 4;
        ctx.shadowBlur = 15; ctx.shadowColor = o.c;
        ctx.strokeRect(o.x, world.h-o.h, o.w, o.h); ctx.shadowBlur = 0;
        // Окна
        ctx.fillStyle = o.c + '33';
        for(let i=0; i<o.w/40; i++) ctx.fillRect(o.x+10+i*40, world.h-o.h+50, 20, 30);
    });

    // Еда (НОВЫЙ ВИЗУАЛ)
    food.forEach(f => {
        ctx.save(); ctx.translate(f.x, f.y);
        ctx.rotate(tick * 0.05 + f.s);
        if(f.type === 'small') {
            ctx.fillStyle = '#0ff'; ctx.fillRect(-6,-6, 12, 12); // Микрочип
            ctx.strokeStyle = '#fff'; ctx.strokeRect(-8,-8, 16, 16);
        } else {
            ctx.fillStyle = '#f0f'; ctx.beginPath();
            for(let i=0; i<4; i++) ctx.lineTo(Math.cos(i*1.5)*15, Math.sin(i*1.5)*15);
            ctx.closePath(); ctx.fill(); // Энерго-ядро
            ctx.shadowBlur = 10; ctx.shadowColor = '#f0f';
        }
        ctx.restore();
    });

    // Игрок
    ctx.save();
    if(player.face === -1) { ctx.translate(player.x*2, 0); ctx.scale(-1, 1); }
    evos[player.level].d(player.x, player.y, evos[player.level].s, tick);
    ctx.restore();

    ctx.restore();

    // UI
    document.getElementById('stage-name').innerText = evos[player.level].n;
    document.getElementById('xp-bar-fill').style.width = (player.xp/evos[player.level].xp*100) + '%';
    document.getElementById('status').innerText = `SCORE: ${player.xp}`;
}

init();
</script>
</body>
</html>

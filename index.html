<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hatamal: Neon Evolution</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05050a; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 15px; left: 15px; color: #0ff;
            background: rgba(0,0,0,0.7); padding: 10px; border: 2px solid #0ff;
            border-radius: 8px; pointer-events: none; box-shadow: 0 0 15px #0ff;
        }
        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(0, 255, 255, 0.1);
            border: 3px solid #0ff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: #0ff;
            font-size: 35px; font-weight: bold; user-select: none;
            box-shadow: 0 0 10px #0ff;
        }
        .btn:active { background: rgba(0, 255, 255, 0.5); transform: scale(0.9); }
    </style>
</head>
<body>

<div id="ui">
    <div id="stage" style="font-size: 1.2em; font-weight: bold;">EVO: 1 - НЕО-МИКРОБ</div>
    <div id="xp" style="color: #f0f;">МАССА: 0 / 20</div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <div style="display: flex; gap: 25px;">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="btn" id="btnFly" style="background: rgba(255,0,255,0.1); border-color: #f0f; box-shadow: 0 0 10px #f0f;">↑</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- ПАРАМЕТРЫ МИРА ---
const world = { width: 3000, height: 1500 }; // Карта в 2 раза больше
const gravity = 0.25; 
const friction = 0.95;

// --- ПРЕГРАДЫ ---
let obstacles = [];
for(let i=0; i<15; i++) {
    obstacles.push({
        x: 400 + Math.random() * (world.width - 800),
        y: world.height - (200 + Math.random() * 600),
        w: 60 + Math.random() * 100,
        h: 800,
        color: '#111',
        neon: Math.random() > 0.5 ? '#0ff' : '#f0f'
    });
}

// --- ЭВОЛЮЦИИ (8 СТАДИЙ) ---
const evolutions = [
    { name: "НЕО-МИКРОБ", xp: 20, size: 15, speed: 0.3, fly: 2.2, draw: (x,y,r,t) => {
        ctx.fillStyle = '#0f8'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#fff'; ctx.strokeRect(x-2, y-2, 4, 4);
    }},
    { name: "КИБЕР-ЛИЧИНКА", xp: 50, size: 22, speed: 0.35, fly: 2.5, draw: (x,y,r,t) => {
        ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.ellipse(x,y,r*1.2, r, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#000'; ctx.fillRect(x+5, y-5, 4, 4);
    }},
    { name: "ШИПОВАННЫЙ ДРОН", xp: 100, size: 30, speed: 0.4, fly: 2.8, draw: (x,y,r,t) => {
        ctx.fillStyle = '#f0f';
        for(let i=0; i<6; i++) {
            let a = i*Math.PI/3 + t*0.05;
            ctx.beginPath(); ctx.moveTo(x,y); 
            ctx.lineTo(x+Math.cos(a)*(r+10), y+Math.sin(a)*(r+10)); ctx.lineTo(x+Math.cos(a+0.5)*(r), y+Math.sin(a+0.5)*(r));
            ctx.fill();
        }
    }},
    { name: "ПЛАЗМЕННЫЙ СКАТ", xp: 180, size: 40, speed: 0.45, fly: 3.2, draw: (x,y,r,t) => {
        ctx.fillStyle = '#0af'; ctx.beginPath(); ctx.moveTo(x-r, y); ctx.quadraticCurveTo(x, y-r, x+r, y);
        ctx.quadraticCurveTo(x, y+r, x-r, y); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+r+15, y+Math.sin(t*0.1)*10); ctx.stroke();
    }},
    { name: "ОКО КИБЕРПАКА", xp: 300, size: 50, speed: 0.5, fly: 3.5, draw: (x,y,r,t) => {
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(x + Math.cos(t*0.05)*10, y + Math.sin(t*0.05)*10, r/2, 0, Math.PI*2); ctx.fill();
    }},
    { name: "МЕХА-ГРИФОН", xp: 500, size: 60, speed: 0.55, fly: 3.8, draw: (x,y,r,t) => {
        ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#0ff'; ctx.fillRect(x-r, y-Math.sin(t*0.2)*r, r*2, 10); // Крылья
    }},
    { name: "ПУСТОТНЫЙ ЖНЕЦ", xp: 800, size: 75, speed: 0.6, fly: 4.2, draw: (x,y,r,t) => {
        ctx.fillStyle = '#111'; ctx.strokeStyle='#f00'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(x-r, y); ctx.lineTo(x, y-r*1.5); ctx.lineTo(x+r, y); ctx.lineTo(x, y+r*1.5); ctx.closePath(); ctx.fill(); ctx.stroke();
    }},
    { name: "НЕОНОВЫЙ ЛОРД", xp: Infinity, size: 100, speed: 0.65, fly: 5, draw: (x,y,r,t) => {
        let grad = ctx.createRadialGradient(x,y,0,x,y,r);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.5, '#0ff'); grad.addColorStop(1, '#f0f');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur = 30; ctx.shadowColor = '#0ff';
    }}
];

// --- ИГРОК ---
const player = { x: 100, y: 100, vx: 0, vy: 0, level: 0, xp: 0, faceRight: true };

// --- ЕДА ---
let food = [];
const spawn = (type) => {
    food.push({ x: Math.random()*world.width, y: Math.random()*(world.height-100), type });
}

for(let i=0; i<60; i++) spawn('small');
for(let i=0; i<20; i++) spawn('big');

// Редкая еда (теперь каждые 5 секунд)
setInterval(() => spawn('rare'), 5000);

// --- УПРАВЛЕНИЕ ---
const keys = {};
const doFly = () => { player.vy -= evolutions[player.level].fly; };

document.getElementById('btnFly').ontouchstart = (e) => { e.preventDefault(); doFly(); };
document.getElementById('btnLeft').ontouchstart = (e) => { e.preventDefault(); keys.Left = true; };
document.getElementById('btnLeft').ontouchend = () => keys.Left = false;
document.getElementById('btnRight').ontouchstart = (e) => { e.preventDefault(); keys.Right = true; };
document.getElementById('btnRight').ontouchend = () => keys.Right = false;

window.onkeydown = (e) => { if(e.code==='ArrowUp' || e.code==='Space') doFly(); keys[e.code]=true; };
window.onkeyup = (e) => keys[e.code]=false;

// --- ЦИКЛ ---
let tick = 0;
function loop() {
    tick++;
    const evo = evolutions[player.level];

    // Ходьба (стала медленнее и плавнее)
    if (keys.ArrowLeft || keys.Left) { player.vx -= evo.speed; player.faceRight = false; }
    if (keys.ArrowRight || keys.Right) { player.vx += evo.speed; player.faceRight = true; }

    player.vx *= friction;
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Столкновения с преградами
    obstacles.forEach(o => {
        if(player.x+evo.size > o.x && player.x-evo.size < o.x+o.w && player.y+evo.size > o.y) {
            if(player.y < o.y + 20) { player.y = o.y - evo.size; player.vy = 0; }
            else { player.vx *= -1; player.x += player.vx * 2; }
        }
    });

    // Границы
    if(player.y > world.height - evo.size) { player.y = world.height - evo.size; player.vy = 0; }
    if(player.x < evo.size) player.x = evo.size;
    if(player.x > world.width - evo.size) player.x = world.width - evo.size;

    // Еда
    food = food.filter(f => {
        let dist = Math.hypot(player.x - f.x, player.y - f.y);
        if(dist < evo.size + 15) {
            if(f.type === 'small') player.xp += 1;
            else if(f.type === 'big') player.xp += 3;
            else player.xp += 15;
            
            if(f.type !== 'rare') setTimeout(() => spawn(f.type), 3000);
            return false;
        }
        return true;
    });

    if(player.xp >= evo.xp && player.level < evolutions.length-1) {
        player.level++; player.xp = 0;
    }

    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.fillStyle = '#05050a'; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    const cx = Math.max(0, Math.min(player.x - canvas.width/2, world.width - canvas.width));
    const cy = Math.max(0, Math.min(player.y - canvas.height/2, world.height - canvas.height));

    ctx.save(); ctx.translate(-cx, -cy);

    // Сетка города
    ctx.strokeStyle = '#112';
    for(let i=0; i<world.width; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,world.height); ctx.stroke(); }

    // Преграды (Небоскребы)
    obstacles.forEach(o => {
        ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = o.neon; ctx.lineWidth = 2; ctx.strokeRect(o.x, o.y, o.w, o.h);
        // Окна
        ctx.fillStyle = o.neon;
        for(let i=0; i<3; i++) ctx.fillRect(o.x+10, o.y+20+i*40, o.w-20, 10);
    });

    // Отрисовка еды
    food.forEach(f => {
        if(f.type === 'small') {
            ctx.fillStyle = '#0ff'; ctx.fillRect(f.x-4, f.y-4, 8, 8); // Энерго-куб
        } else if(f.type === 'big') {
            ctx.fillStyle = '#f0f'; ctx.beginPath(); ctx.moveTo(f.x, f.y-10); 
            ctx.lineTo(f.x+8, f.y+5); ctx.lineTo(f.x-8, f.y+5); ctx.fill(); // Кристалл
        } else {
            // Переливающаяся звезда
            ctx.fillStyle = `hsl(${tick%360}, 100%, 50%)`;
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); for(let i=0; i<5; i++) {
                ctx.lineTo(f.x+Math.cos(i*1.25+tick*0.1)*15, f.y+Math.sin(i*1.25+tick*0.1)*15);
            }
            ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
        }
    });

    // Игрок
    ctx.save();
    if(!player.faceRight) { ctx.translate(player.x*2, 0); ctx.scale(-1,1); }
    evolutions[player.level].draw(player.x, player.y, evolutions[player.level].size, tick);
    ctx.restore();

    ctx.restore();

    document.getElementById('stage').innerText = `EVO: ${player.level+1} - ${evolutions[player.level].name}`;
    document.getElementById('xp').innerText = `МАССА: ${player.xp} / ${evolutions[player.level].xp === Infinity ? 'MAX' : evolutions[player.level].xp}`;
}

loop();
</script>
</body>
</html>
